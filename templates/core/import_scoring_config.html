{% extends 'base.html' %}

{% block title %}Import Scoring Configuration - ExamAutoPro{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 fw-bold mb-1"><i class="fas fa-file-import text-primary me-2"></i>Import Scoring Configuration</h1>
            <p class="text-muted mb-0">Import a previously exported scoring spreadsheet.</p>
        </div>
        <a href="{% url 'core:scoring_dashboard' %}" class="btn btn-outline-secondary">
            <i class="fas fa-arrow-left me-1"></i>Scoring
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label" for="excel_file">Excel File</label>
                    <input type="file" class="form-control" id="excel_file" name="excel_file" accept=".xlsx,.xls,.csv" required>
                </div>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-file-import me-1"></i>Import
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
